name: .NET Framework Desktop (VSTO Add-in)
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore CrmOutlookAddIn\CrmOutlookAddIn.sln

      # ★ 追加: 証明書を証明書ストアにインポート
      - name: Import signing certificate
        run: |
          $pfxPath = "${{ github.workspace }}\CrmOutlookAddIn\CrmOutlookAddIn_TemporaryKey.pfx"
          Import-PfxCertificate `
            -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (New-Object System.Security.SecureString)
        shell: pwsh

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Build VSTO project
        run: |
          msbuild CrmOutlookAddIn\CrmOutlookAddIn.csproj /target:Publish /p:Configuration=Release /p:PublishDir=publish /p:BootstrapperEnabled=false /p:SignBootstrapper=false

      - name: Archive publish folder
        run: |
          powershell -Command "Compress-Archive -Path CrmOutlookAddIn\publish\* -DestinationPath ClickOnceSetup.zip"

      - name: Upload build artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: ClickOnceSetup
          path: ClickOnceSetup.zip
